<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — GrubMarket</title>
  <link rel="icon" href="https://www.grubmarket.com/hello/favicon.ico" />
  <link rel="stylesheet" href="css/style.css?v=20260716" />
</head>
<body>
  <div id="site-header-mount"></div>

  <main>
    <section class="page-hero">
      <div class="wrap">
        <div class="crumb"><a href="index.html">Home</a><span class="sep">›</span>Contact</div>
        <h1>Let's talk</h1>
        <p class="lead">Tell us a little about you and what you're looking for — wholesale buying, selling your harvest, software, or delivery — and the right team will get back to you.</p>
      </div>
    </section>

    <section class="section">
      <div class="wrap">
        <form id="leadForm" class="lead-form" novalidate>
          <div class="field">
            <label for="f-name">Name</label>
            <input id="f-name" name="name" type="text" autocomplete="name" required />
          </div>
          <div class="field">
            <label for="f-email">Email</label>
            <input id="f-email" name="email" type="email" autocomplete="email" required />
          </div>
          <div class="field">
            <label for="f-company">Company or farm <span class="opt">(optional)</span></label>
            <input id="f-company" name="company" type="text" autocomplete="organization" />
          </div>
          <div class="field">
            <label for="f-role">I'm a…</label>
            <select id="f-role" name="role">
              <option value="grocer">Grocer or restaurant</option>
              <option value="grower">Grower or farmer</option>
              <option value="distributor">Distributor or wholesaler</option>
              <option value="enterprise">Enterprise / software buyer</option>
              <option value="investor">Investor</option>
              <option value="household">Household or office</option>
              <option value="other">Something else</option>
            </select>
          </div>
          <div class="field full">
            <label for="f-message">How can we help? <span class="opt">(optional)</span></label>
            <textarea id="f-message" name="message" rows="4"></textarea>
          </div>
          <div class="field full">
            <button type="submit" class="btn solid">Send message</button>
            <p id="formStatus" class="form-status" role="status" aria-live="polite"></p>
          </div>
        </form>
      </div>
    </section>
  </main>

  <div id="site-footer-mount"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/layout.js?v=20260716"></script>
  <script src="js/contact.js"></script>
</body>
</html>
